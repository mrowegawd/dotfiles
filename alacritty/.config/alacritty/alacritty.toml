# dynamic_title = true
# enable_experimental_conpty_backend = false
live_config_reload = true
working_directory = "None"

[cursor]
unfocused_hollow = true

[debug]
log_level = "Warn"
persistent_logging = false
print_events = false
render_timer = false

[env]
TERM = "xterm-256color"

[font]
size = 11.5

# [font.bold]
# family = "Fisa Code"
# style = "Bold"
#
# [font.bold_italic]
# family = "Victor Mono"
# style = "Bold Italic"
#
# [font.italic]
# family = "CamingoCode Nerd Font"
# style = "Italic"
#
# [font.normal]
# family = "Fisa Code"
# style = "Regular"

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.bold_italic]
family = "JetBrains Mono"
style = "Bold Italic"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "ResetFontSize"
key = "Home"
mods = "Control"

[[keyboard.bindings]]
action = "ScrollPageUp"
key = "PageUp"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "ScrollPageDown"
key = "PageDown"
mods = "Control|Shift"

[mouse]
hide_when_typing = true

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = false
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"

[window.padding]
x = 0
y = 0

[colors.primary]
background = "#1f1f1f"
foreground = "#cccccc"

[colors.search.focused_match]
background = "#613214"
foreground = "#cccccc"

[colors.search.matches]
background = "#1f1f1f"
foreground = "#cccccc"

[colors.selection]
background = "#264f78"
text = "#cccccc"

[colors.bright]
black = "#666666"
blue = "#3b8eea"
cyan = "#29b8db"
green = "#23d18b"
magenta = "#d670d6"
red = "#f14c4c"
white = "#e5e5e5"
yellow = "#f5f543"

[colors.cursor]
cursor = "#cccccc"
text = "#1f1f1f"

[colors.normal]
black = "#000000"
blue = "#2472c8"
cyan = "#11a8cd"
green = "#0dbc79"
magenta = "#bc3fbc"
red = "#cd3131"
white = "#e5e5e5"
yellow = "#e5e510"

