set -g @plugin 'Morantron/tmux-fingers'

set -g @fingers-pattern-1 "(([.\\w\\-~\\$@]+)?(/[.\\w\\-@]+)+/?):\\d+"
set -g @fingers-pattern-2 "(([.\\w\\-~\\$@]+)?(/[.\\w\\-@]+)+/?)\",\\sline\\s\\d+" # for error python

# Pattern untuk Python error (contoh: File "script.py", line 10)

set -g @fingers-pattern-3 'File "([.\\w\\-~/]+\\.py)", line \\d+'

# Pattern untuk Javascript/Node error (contoh: at /home/user/app.js:15:20)

set -g @fingers-pattern-4 'at ([.\\w\\-~/]+\\.(js|ts|jsx|tsx|cjs|mjs)):\\d+:\\d+'

# Pattern untuk C/C++ compiler output (contoh: main.cpp:23:5)

set -g @fingers-pattern-5 '([.\\w\\-~/]+\\.(c|cpp|h|hpp)):\\d+:\\d+'

# Pattern untuk Go error/stacktrace (contoh: /home/user/main.go:45 +0x123)

# set -g @fingers-pattern-6 '([.\\w\\-~/]+\\.go):\\d+(?:\\s\\+0x[0-9a-f]+)?'

# Pattern untuk matching function definitions Python (contoh: def my_func(...))

