# session: choice session
# bind S               choose-session

# }}}
# misc and custom binding ---------------- {{{

# misc: next play [music]
# bind >              run 'mpc -q next'

# misc: edit capture pane (bind-e)
bind-key e send-keys "tmux capture-pane -p -S - | nvim -c 'set buftype=nofile' +" Enter

# misc: save capture-pane (bind-E)
bind-key E command-prompt -p 'save history to filename:' -I '~/Downloads/tmux.history' 'capture-pane -S -32768 ; save-buffer %1 ; delete-buffer'

# misc: clock mode (bind-c)
bind c              clock-mode

# misc: tmux attach for wiki (bind-N)
bind -r N if -F '#{==:#S,tmp_tmux}' {
    detach
} {
    set -gF '@last_session_name' '#S'
    display-popup -d '#{pane_current_path}' -xR -yC -w '63%' -h '100%' \
    -E -d "$HOME/Dropbox/neorg" \
    -E 'tmux new -A -s tmp_tmux "tmux set -w pane-border-status off; tmux set -w detach-on-destroy on; TMUX_SESSION=tmp_tmux $SHELL"'
}

