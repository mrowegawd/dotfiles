set -g @plugin 'Morantron/tmux-fingers'

set -g @fingers-pattern-1 "(([.\\w\\-~\\$@]+)?(/[.\\w\\-@]+)+/?):\\d+"
set -g @fingers-pattern-2 "(([.\\w\\-~\\$@]+)?(/[.\\w\\-@]+)+/?)\",\\sline\\s\\d+" # for error python

# Pattern untuk Python error (contoh: File "script.py", line 10)

set -g @fingers-pattern-3 'File "([.\\w\\-~/]+\\.py)", line \\d+'

# Pattern untuk Javascript/Node error (contoh: at /home/user/app.js:15:20)

set -g @fingers-pattern-4 'at ([.\\w\\-~/]+\\.(js|ts|jsx|tsx|cjs|mjs)):\\d+:\\d+'

# Pattern untuk C/C++ compiler output (contoh: main.cpp:23:5)

set -g @fingers-pattern-5 '([.\\w\\-~/]+\\.(c|cpp|h|hpp)):\\d+:\\d+'

# Pattern untuk Go error/stacktrace (contoh: /home/user/main.go:45 +0x123)

# set -g @fingers-pattern-6 '([.\\w\\-~/]+\\.go):\\d+(?:\\s\\+0x[0-9a-f]+)?'

# Pattern untuk matching function definitions Python (contoh: def my_func(...))

# set -g @fingers-pattern-7 '^\\s*def\\s+([\\w_]+)\\s*\\('

# Pattern untuk matching class definitions Python (contoh: class MyClass(...))

# set -g @fingers-pattern-8 '^\\s*class\\s+([\\w_]+)\\s*\\(?'

# Pattern untuk matching imports Python (contoh: import os or from os import path)

# set -g @fingers-pattern-9 '^\\s*(?:import|from)\\s+([\\w\\.]+)'

# Pattern untuk URL (http, https, ftp)

set -g @fingers-pattern-6 '((https?|ftp):\/\/[^\s"'\''<>]+)'

# Pattern tambahan untuk URL tanpa schema (misal localhost:3000/path)

# set -g @fingers-pattern-11 '((localhost|127\.0\.0\.1)(:\d+)?(/[^\s"'\''<>]*)?)'

# plugin-fingers: jump to selected target (bind-J)
set -g @fingers-jump-key J

# plugin-fingers: enter fingers mode to select target (bind-F)
set -g @fingers-key F

# plugin-fingers: open selected to main pane via custom script (bind-F + Alt)
set -g @fingers-alt-action "$HOME/.config/miscxrdb/bin/tm-toggle-pane jump_to_main_pane"

# --------------------------------------------------------------------------

if 'test ! -d ~/.config/tmux/plugins/tpm' \
  'run "git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm"'

run -b '~/.config/tmux/plugins/tpm/tpm'

run-shell "$XDG_CONFIG_HOME/miscxrdb/tmux/navi.tmux
#
# }}}
