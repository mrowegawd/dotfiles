# plugins -------------------------------- {{{

# plugin: install all plugins (bind-I)
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

# Usage:
#   prefix + I        - install the plugin
#   prefix + U        - updates the plugin

# plugin: update all plugins (bind-U)
