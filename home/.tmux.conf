# panes ---------------------------------- {{{

# pane: display/show number (bind-Q)
bind Q                display-panes

# pane: kill/quit (bind-q)
bind q                kill-pane

# pane: kill/quit (m-x)
bind -n M-x           if -F "#{@pane-is-vim}" "send-keys M-x" "kill-pane"

# pane: split vertical (bind-l)
bind l                run -b "bash $HOME/.config/miscxrdb/bin/tm-toggle-pane open_vsplit"

# pane: split horizontal (bind-j)
bind j                run -b "bash $HOME/.config/miscxrdb/bin/tm-toggle-pane open_split"

# pane: toggle zoom (m-M)
bind -n M-M           run -b "bash $HOME/.config/miscxrdb/bin/tm-pane-bar-toggle toggle_zoom_and_hide_bar_pane"

# pane: reset size (m-w)
bind -n M-w           run-shell "bash $HOME/.config/miscxrdb/bin/tm-toggle-pane reset_pane_workspaces"

# pane: rotate (m-R)
bind -n M-R           rotate-window -D \; select-pane -t :.+

# pane: join pane to window 1 (m-!)
bind -n M-!           join-pane -v -t :=1

# pane: join pane to window 2 (m-@)
bind -n M-@           join-pane -v -t :=2

# pane: join pane to window 3 (m-#)
bind -n M-#           join-pane -v -t :=3

# pane: join pane to window 4 (m-$)
bind -n M-$           join-pane -v -t :=4

# pane: join pane to window 5 (m-%)
bind -n M-%           join-pane -v -t :=5

# pane: join pane to window 6 (m-^)
bind -n M-^           join-pane -v -t :=6

# pane: join pane to window 7 (m-&)
bind -n M-&           join-pane -v -t :=7

# pane: join pane to window 8 (m-*)
bind -n M-*           join-pane -v -t :=8

# pane: swap left (m-Left)
bind -n M-S-Left        splitw -fhb \; swapp -t ! \; killp -t !

# pane: swap down (m-Down)
bind -n M-S-Down        splitw -fv  \; swapp -t ! \; killp -t !

# pane: swap up (m-Up)
bind -n M-S-Up          splitw -fvb \; swapp -t ! \; killp -t !

# pane: swap right (m-Right)
bind -n M-S-Right       splitw -fh  \; swapp -t ! \; killp -t !
#
# }}}
# window --------------------------------- {{{

# window: swap prev (m-c-Left)
bind -n M-C-Left      swap-window -d -t '{previous}' # Move window left.

# window: swap next (m-c-Right)
bind -n M-C-Right     swap-window -d -t '{next}' # Move window right.

# window: next (m-c-l)
bind -n M-C-l         next

# window: prev (m-c-h)
bind -n M-C-h         prev

# window: kill (m-X)
bind -n M-X           confirm-before -p "kill window '#W'? (y/n)" kill-window

# window: create new (m-N)
bind -n M-N           neww -c "#{pane_current_path}"

# }}}
# sessions ------------------------------- {{{
#
# session: last session (m-b)
bind -n M-b           run-shell "if $is_yazi; then tmux send-keys M-b; else tmux run -b \"bash $HOME/.config/miscxrdb/bin/tm-toggle-pane last_session\"; fi"

# session: select or create a session (m-S)
bind -n M-S           run -b 'bash ~/.config/tmuxconfig/scripts/select-sesh'

# session: next (m-c-j)
bind -n M-C-n         switch-client -n

# session: prev (m-c-k)
bind -n M-C-p         switch-client -p

# session: detach (bind-D)
bind -r D             detach

