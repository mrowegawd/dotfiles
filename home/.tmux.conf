# set-hook -g           pane-focus-out "run -b 'bash $HOME/.config/miscxrdb/bin/tm-pane-bar-toggle toggle_border_visibility_and_file_manager'"

set-hook -g           pane-focus-in "run -b 'bash $HOME/.config/miscxrdb/bin/tm-toggle-pane auto_resize_pane'"

# misc: toggle terminal (m-f)
bind -n M-f           run -b "bash $HOME/.config/miscxrdb/bin/tm-toggle-pane handle_split_term"

# misc: toggle todo progress (m-s-F8)
bind -n M-S-F8        run-shell "if $is_fzf; then tmux send-keys M-S-F8; else tmux run -b \"$HOME/.config/miscxrdb/bin/tm-toggle-pane handle_show_notes\"; fi"

# misc: open ctrl-O (m-Y)
bind -n M-Y           run-shell "if $is_yazi; then tmux send-keys M-Y; else tmux run -b \"$HOME/.config/miscxrdb/bin/fz-ctrlo callme\"; fi"

# misc: open file manager (m-e)
bind -n M-e           run -b 'bash $HOME/.config/miscxrdb/bin/tm-toggle-pane handle_open_filetree'

# misc: open nvim note (m-W)
bind -n M-W           run -b "bash $HOME/.config/miscxrdb/bin/fz-ctrlo open_notes"

# misc: reload/refresh tmux config (m-s-F5)
bind -n M-S-F5        source-file ~/.tmux.conf \; display "Tmux config reloaded"

# misc: open btop (m-B)
bind -n M-B           run-shell "if $is_yazi || $is_fzf; then tmux send-keys M-B; else tmux run -b \"$HOME/.config/miscxrdb/bin/fz-ctrlo open_ps_btop\"; fi"

# misc: open float terminal (m-T)
bind -n M-T           run-shell "if $is_yazi || $is_fzf; then tmux send-keys M-T; else tmux run -b \"$HOME/.config/miscxrdb/bin/tm-toggle-pane float_term\"; fi"

# misc: open rkill (m-C)
bind -n M-C           run -b "bash $HOME/.config/miscxrdb/bin/fz-ctrlo open_rkill"

# misc: open resterm (m-Z)
bind -n M-Z           run -b "bash $HOME/.config/miscxrdb/bin/fz-ctrlo open_resterm"

# misc: open lazygit (m-G)
bind -n M-G           run -b "bash $HOME/.config/miscxrdb/bin/fz-ctrlo open_lazygit"

# misc: open lazydocker (m-D)
bind -n M-D           run -b "bash $HOME/.config/miscxrdb/bin/fz-ctrlo open_lazydocker"

# misc: show help keys (bind-?)
bind -r ?             run-shell 'tmux neww -n "help" "tmux list-keys -N | fzf"'

