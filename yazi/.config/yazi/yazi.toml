# yazi.toml
[mgr]
show_hidden = true
ratio = [0, 3, 0]     # set 0 - remove view panel
sort_dir_first = true
sort_by = "natural"

[preview]
image_delay = 50 # tambah delay supaya terminal sempat respond

[opener]
edit = [
  { run = '$EDITOR "$@"', block = true, for = "unix" },
  { run = 'code "%*"', orphan = true, for = "windows" },
]

play = [{ run = 'mpv --force-window "$@"', orphan = true, for = "unix" }]

[plugin]
prepend_fetchers = [
  # plugins - git.yazi
  { id = "git", url = "*", run = "git" },
  { id = "git", url = "*/", run = "git" },
]

