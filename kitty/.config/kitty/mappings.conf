
# If you want to use multiple keypresses for shortcuts, check:
# https://github.com/kovidgoyal/kitty/discussions/3457
# cmd, ctrl+shift, ctrl+a>l (just like tmux key combination)

clear_all_shortcuts                 yes

# basic: leader key (win, cmd)
kitty_mod                           alt

# basic: go page up
# map kitty_mod+page_up               scroll_page_up

# basic: go page down
# map kitty_mod+page_down             scroll_page_down

map ctrl+j kitten pass_keys.py neighboring_window bottom ctrl+j
map ctrl+k kitten pass_keys.py neighboring_window top    ctrl+k
map ctrl+h kitten pass_keys.py neighboring_window left   ctrl+h
map ctrl+l kitten pass_keys.py neighboring_window right  ctrl+l

# basic: enter copy mode
map kitty_mod+enter                 show_scrollback

# pane: create new pane
map kitty_mod+j                     new_window

# pane: close other pane
map kitty_mod+shift+q               close_window

# pane: move to next pane
map kitty_mod+up                    next_window

# pane: move to prev pane
map kitty_mod+down                  previous_window

# window: next window
map kitty_mod+l                     next_tab

# window: prev window
map kitty_mod+h                     previous_tab

# window: create new window
map kitty_mod+n                     new_tab

# window: move window to next
map kitty_mod+shift+right           move_tab_forward

# window: move window to prev
map kitty_mod+shift+left            move_tab_backward

