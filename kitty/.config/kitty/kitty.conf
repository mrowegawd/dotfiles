# font_family                       JetBrainsMono Nerd Font
# bold_font                         JetBrainsMono Nerd Font bold
# italic_font                       JetBrainsMono Nerd Font italic
# bold_italic_font                  JetBrainsMono Nerd Font bold italic

font_family                       JetBrains Mono NL
bold_font                         auto
italic_font                       auto
bold_italic_font                  auto

# untuk support ligatures
disable_ligatures never

# font_size 7.8
font_size 7.5


# adjust_line_height                0
# adjust_column_width               0

# box_drawing_scale                 0.001, 1, 1.5, 2

# The cursor shape can be one of (block, beam, underline)
cursor_shape                      block
# cursor_beam_thickness 1.5
#: Defines the thickness of the beam cursor (in pts)
# cursor_underline_thickness 2.0

# cursor_blink_interval             0.5
# cursor_stop_blinking_after        15.0
cursor_blink_interval             0
# cursor_stop_blinking_after        0


scrollback_lines                  10000
# scrollback_pager                  less +G -R
scrollback_pager nvim -c 'setlocal nonumber nolist showtabline=0 foldcolumn=0|Man!' -c "autocmd VimEnter * normal G" -
# scrollback_pager_history_size     0

wheel_scroll_multiplier           1.0
touch_scroll_multiplier           1.0
url_style                         double
open_url_with                     default
copy_on_select                    yes

# rectangle_select_modifiers        ctrl+alt
select_by_word_characters         :@-./_~?&=%+#

click_interval                    -1.0
mouse_hide_wait                   1.0
focus_follows_mouse               no

repaint_delay                     10
input_delay                       3
sync_to_monitor                   yes

enable_audio_bell                 no
visual_bell_duration              0.0
window_alert_on_bell              no

bell_on_tab no

remember_window_size              no
initial_window_width              780
initial_window_height             481

enabled_layouts                   *

window_resize_step_cells          2
window_resize_step_lines          2

window_border_width               1.0

draw_minimal_borders              yes

window_margin_width               2.0
single_window_margin_width        -1000.0

window_padding_width              0

inactive_text_alpha               1.0

hide_window_decorations           yes

tab_bar_edge                      top
tab_bar_margin_width              0.0
tab_bar_style                     fade

tab_fade                          0.25 0.5 0.75 1

tab_separator                     " ┇"
# tab_title_template                {title}
tab_title_template                " {index}: {title[:10]} "

active_tab_foreground             #000
active_tab_background             #eee
active_tab_font_style             bold-italic

inactive_tab_foreground           #444
inactive_tab_background           #999
inactive_tab_font_style           normal

include ~/.config/kitty/colors/catppuccin.conf

# background_opacity                0
dynamic_background_opacity        no

shell .

editor .

close_on_child_death              no
allow_remote_control              yes
startup_session                   none

clipboard_control                 write-clipboard write-primary
term                              xterm-kitty

macos_titlebar_color              system
macos_option_as_alt               yes
macos_hide_from_tasks             no
macos_quit_when_last_window_closed no
macos_window_resizable            yes
macos_thicken_font                0
macos_traditional_fullscreen      no
macos_custom_beam_cursor          no

# include ~/.config/kitty/mappings.conf

map ctrl+shift+c                  copy_to_clipboard
map ctrl+shift+v                  paste_from_clipboard

# basic: zoom in
map ctrl+equal                    change_font_size all +1.0

# basic: zoom out
map ctrl+minus                    change_font_size all -1.0

# basic: zoom reset
map ctrl+Home                     change_font_size all 0

map ctrl+shift+h                  no_op
