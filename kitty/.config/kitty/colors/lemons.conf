# Lemons Kitty Theme
# Generated from provided Neovim palette

foreground #f0f0f0
background #040404
cursor     #f0f0f0
selection_background #212121
selection_foreground #f0f0f0

# URL style
# You can combine attributes: none, bold, italic, underline, reverse
# URL color defaults to color4 (blue) if not specified
url_color #5088ed
url_style underline

# Standard colors
color0  #040404
color1  #ed505e
color2  #2ed563
color3  #f0be42
color4  #5088ed
color5  #f45ab4
color6  #37c3b5
color7  #cacaca

# Bright colors
color8  #161616
color9  #ed505e
color10 #2ed592
color11 #fa8a49
color12 #5088ed
color13 #f45ab4
color14 #6ad8ed
color15 #f0f0f0


# Kitty window border colors
active_border_color #101010
inactive_border_color #040404
bell_border_color       #F9E2AF

# Tabs
active_tab_background #382013
active_tab_foreground #f0f0f0
inactive_tab_background #040404
inactive_tab_background #040404
tab_bar_background #040404
